    right_table: monthly_shipments
    relationship_columns:
      - left_column: PRODUCT_SEGMENT_CODE
        right_column: PRODUCT_SEGMENT_CODE

  - name: optimal_pricing_to_shipments
    left_table: optimal_pricing
    right_table: monthly_shipments
    relationship_columns:
      - left_column: REGION_CODE
        right_column: REGION_CODE
      - left_column: PRODUCT_SEGMENT_CODE
        right_column: PRODUCT_SEGMENT_CODE

  - name: quarry_sites_to_regions
    left_table: msha_quarry_sites
