# =============================================================================
# Cortex Analyst Semantic Model — GRANITE v2.2
# SnowCore Materials Revenue Intelligence Platform
# =============================================================================

name: vulcan_revenue_model
description: >
  Semantic model for SnowCore Materials (Vulcan) revenue intelligence platform.
  Covers shipment volumes, product segments, pricing, margins, elasticity,
  optimal pricing, copula risk analytics, competitor quarry intelligence,
  and model comparison (naive vs copula).

tables:
  # ============================================
  # MONTHLY_SHIPMENTS - Primary volume data
  # ============================================
  - name: monthly_shipments
    description: Monthly aggregate shipment volumes by region, product, and customer segment. Primary fact table with 2,664 rows (6 products x 6 regions x 74 months).
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: MONTHLY_SHIPMENTS
    primary_key:
      columns: [shipment_id]

    dimensions:
      - name: shipment_id
        description: Unique shipment record identifier (identity column).
        expr: SHIPMENT_ID
        data_type: NUMBER

      - name: region_code
        synonyms: ["region", "market", "geography", "territory"]
        description: Geographic sales region.
        expr: REGION_CODE
        data_type: TEXT
        sample_values: ["TEXAS", "SOUTHEAST", "FLORIDA", "CALIFORNIA", "VIRGINIA", "ILLINOIS", "MEXICO"]

      - name: product_segment_code
        synonyms: ["product", "material", "aggregate type", "product line", "product segment"]
        description: Product segment code. V1 products (AGG_STONE, AGG_SAND, AGG_SPECIALTY) are core aggregates. V2 products (ASPHALT_MIX, CONCRETE_RMX, SERVICE_LOGISTICS) are downstream.
        expr: PRODUCT_SEGMENT_CODE
        data_type: TEXT
        sample_values: ["AGG_STONE", "AGG_SAND", "AGG_SPECIALTY", "ASPHALT_MIX", "CONCRETE_RMX", "SERVICE_LOGISTICS"]

    time_dimensions:
      - name: year_month
        synonyms: ["month", "period", "date"]
        description: Month of the shipment data.
        expr: YEAR_MONTH
        data_type: DATE

      - name: fiscal_quarter
        synonyms: ["quarter", "qtr"]
        description: Fiscal quarter derived from month.
        expr: |
          'Q' || CEIL(MONTH(YEAR_MONTH) / 3.0)::VARCHAR
        data_type: TEXT

      - name: fiscal_year
        synonyms: ["year", "FY"]
        description: Fiscal year.
        expr: YEAR(YEAR_MONTH)
        data_type: NUMBER

    facts:
      - name: shipment_tons
        synonyms: ["volume", "tons", "tonnage", "shipments"]
        description: Total tons shipped in the period.
        expr: SHIPMENT_TONS
        data_type: NUMBER

      - name: revenue_usd
        synonyms: ["revenue", "sales", "dollars"]
        description: Total revenue in USD.
        expr: REVENUE_USD
        data_type: NUMBER

      - name: price_per_ton
        synonyms: ["price", "asp", "unit price"]
        description: Average selling price per ton.
        expr: PRICE_PER_TON
        data_type: NUMBER

    metrics:
      - name: total_tons
        synonyms: ["total volume", "total shipments"]
        description: Sum of all tons shipped.
        expr: SUM(monthly_shipments.SHIPMENT_TONS)

      - name: total_revenue
        synonyms: ["total sales"]
        description: Sum of all revenue.
        expr: SUM(monthly_shipments.REVENUE_USD)

      - name: avg_price
        synonyms: ["average price", "realized price"]
        description: Average price per ton.
        expr: SUM(monthly_shipments.REVENUE_USD) / NULLIF(SUM(monthly_shipments.SHIPMENT_TONS), 0)

  # ============================================
  # PRODUCT_SEGMENT - Product reference data
  # ============================================
  - name: product_segment
    description: Product segment reference table with 6 product lines, benchmark pricing, and margin targets.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: PRODUCT_SEGMENT
    primary_key:
      columns: [segment_code]

    dimensions:
      - name: segment_code
        synonyms: ["product code", "product segment code"]
        description: Product segment code used as join key across tables.
        expr: SEGMENT_CODE
        data_type: TEXT
        sample_values: ["AGG_STONE", "AGG_SAND", "AGG_SPECIALTY", "ASPHALT_MIX", "CONCRETE_RMX", "SERVICE_LOGISTICS"]

      - name: segment_name
        synonyms: ["product name", "material name"]
        description: Human-readable product name.
        expr: SEGMENT_NAME
        data_type: TEXT
        sample_values: ["Crushed Stone", "Sand & Gravel", "Specialty Aggregates", "Asphalt Mix", "Ready-Mix Concrete", "Service & Logistics"]

      - name: segment_type
        synonyms: ["product category", "business line"]
        description: Product category grouping.
        expr: SEGMENT_TYPE
        data_type: TEXT
        sample_values: ["AGGREGATES", "ASPHALT", "CONCRETE", "SERVICE"]

      - name: is_primary_business
        description: Whether this is a core aggregates product (TRUE) or downstream (FALSE).
        expr: IS_PRIMARY_BUSINESS
        data_type: BOOLEAN

    facts:
      - name: avg_price_per_ton
        synonyms: ["benchmark price", "list price"]
        description: Benchmark average price per ton for the product.
        expr: AVG_PRICE_PER_TON
        data_type: NUMBER

      - name: avg_margin_pct
        synonyms: ["target margin", "benchmark margin"]
        description: Benchmark average margin percentage.
        expr: AVG_MARGIN_PCT
        data_type: NUMBER

  # ============================================
  # SALES_REGION - Region reference data
  # ============================================
  - name: sales_regions
    description: Sales region reference table with capacity and reserves.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: SALES_REGION
    primary_key:
      columns: [region_code]

    dimensions:
      - name: region_code
        synonyms: ["region"]
        description: Region code.
        expr: REGION_CODE
        data_type: TEXT

      - name: region_name
        synonyms: ["name"]
        description: Full region name.
        expr: REGION_NAME
        data_type: TEXT

      - name: primary_states
        synonyms: ["states"]
        description: States in the region.
        expr: ARRAY_TO_STRING(PRIMARY_STATES, ', ')
        data_type: TEXT

    facts:
      - name: total_reserves
        synonyms: ["reserves", "rock reserves"]
        description: Total proven and probable reserves in tons.
        expr: TOTAL_RESERVES_TONS
        data_type: NUMBER

      - name: annual_capacity
        synonyms: ["capacity"]
        description: Annual production capacity in tons.
        expr: ANNUAL_CAPACITY_TONS
        data_type: NUMBER

  # ============================================
  # DAILY_COMMODITY_PRICES - Input costs
  # ============================================
  - name: commodity_prices
    description: Daily commodity price data. Only natural gas (Henry Hub) is reliably populated.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: DAILY_COMMODITY_PRICES
    primary_key:
      columns: [price_date]

    time_dimensions:
      - name: price_date
        synonyms: ["date"]
        description: Date of the price observation.
        expr: PRICE_DATE
        data_type: DATE

    facts:
      - name: natural_gas
        synonyms: ["gas", "nat gas", "henry hub"]
        description: Natural gas price (Henry Hub) in $/MMBtu.
        expr: NATURAL_GAS_HENRY_HUB
        data_type: NUMBER

    metrics:
      - name: avg_gas_price
        description: Average natural gas price.
        expr: AVG(commodity_prices.NATURAL_GAS_HENRY_HUB)

  # ============================================
  # PRICE_ELASTICITY - Demand elasticity estimates
  # ============================================
  - name: price_elasticity
    description: Own-price elasticity estimates by product segment. Trained via OLS regression. |elasticity| < 1 means inelastic (pricing power), > 1 means elastic (volume risk).
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ML
      table: PRICE_ELASTICITY
    primary_key:
      columns: [elasticity_id]

    dimensions:
      - name: elasticity_id
        description: Unique identifier for the elasticity estimate.
        expr: ELASTICITY_ID
        data_type: NUMBER

      - name: product_segment_code
        synonyms: ["product", "material"]
        description: Product segment for which elasticity was estimated.
        expr: PRODUCT_SEGMENT_CODE
        data_type: TEXT
        sample_values: ["AGG_STONE", "AGG_SAND", "AGG_SPECIALTY", "ASPHALT_MIX", "CONCRETE_RMX", "SERVICE_LOGISTICS"]

      - name: region_code
        synonyms: ["region"]
        description: Region code. ALL means the national average elasticity.
        expr: REGION_CODE
        data_type: TEXT
        sample_values: ["ALL", "TEXAS", "SOUTHEAST", "FLORIDA", "CALIFORNIA", "VIRGINIA", "ILLINOIS"]

      - name: model_version
        description: Model version (v1 or v2).
        expr: MODEL_VERSION
        data_type: TEXT

    facts:
      - name: own_elasticity
        synonyms: ["elasticity", "price sensitivity", "demand elasticity"]
        description: Own-price elasticity of demand. Negative means normal (price up → volume down). Magnitude < 1 is inelastic (pricing power), > 1 is elastic (volume risk).
        expr: OWN_ELASTICITY
        data_type: NUMBER

      - name: r_squared
        synonyms: ["R2", "goodness of fit", "model fit"]
        description: R-squared of the elasticity regression. Higher = better fit. V2 downstream products typically R² > 0.8.
        expr: R_SQUARED
        data_type: NUMBER

      - name: p_value
        description: P-value for the elasticity coefficient. < 0.05 is statistically significant.
        expr: P_VALUE
        data_type: NUMBER

      - name: n_observations
        synonyms: ["sample size"]
        description: Number of observations used in estimation.
        expr: N_OBSERVATIONS
        data_type: NUMBER

  # ============================================
  # ELASTICITY_MATRIX - Cross-elasticities
  # ============================================
  - name: elasticity_matrix
    description: Cross-price elasticity matrix showing substitution/complement relationships between products. Positive cross-elasticity = substitutes, negative = complements.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ML
      table: ELASTICITY_MATRIX
    primary_key:
      columns: [matrix_id]

    dimensions:
      - name: matrix_id
        description: Unique identifier for the cross-elasticity row.
        expr: MATRIX_ID
        data_type: NUMBER

      - name: product_i
        synonyms: ["from product", "source product"]
        description: The product whose demand is affected.
        expr: PRODUCT_I
        data_type: TEXT

      - name: product_j
        synonyms: ["to product", "affecting product"]
        description: The product whose price changed.
        expr: PRODUCT_J
        data_type: TEXT

      - name: relationship_type
        synonyms: ["substitute or complement"]
        description: Whether the products are OWN, SUBSTITUTE, or COMPLEMENT based on cross-elasticity sign.
        expr: RELATIONSHIP_TYPE
        data_type: TEXT
        sample_values: ["OWN", "SUBSTITUTE", "COMPLEMENT"]

    facts:
      - name: cross_elasticity
        synonyms: ["cross price elasticity"]
        description: Cross-price elasticity. Positive means product_i demand rises when product_j price rises (substitutes).
        expr: CROSS_ELASTICITY
        data_type: NUMBER

      - name: p_value
        description: Statistical significance of the cross-elasticity estimate.
        expr: P_VALUE
        data_type: NUMBER

  # ============================================
  # OPTIMAL_PRICING - Price optimization results
  # ============================================
  - name: optimal_pricing
    description: Constrained price optimization results by product and region. Shows current vs optimal price, predicted profit delta, and which constraints bind.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ML
      table: OPTIMAL_PRICING
    primary_key:
      columns: [pricing_id]

    dimensions:
      - name: pricing_id
        description: Unique row identifier for pricing optimization result.
        expr: PRICING_ID
        data_type: NUMBER

      - name: region_code
        synonyms: ["region"]
        description: Sales region for pricing.
        expr: REGION_CODE
        data_type: TEXT

      - name: product_segment_code
        synonyms: ["product"]
        description: Product segment code.
        expr: PRODUCT_SEGMENT_CODE
        data_type: TEXT

      - name: model_version
        description: Optimizer model version.
        expr: MODEL_VERSION
        data_type: TEXT

      - name: optimizer_status
        description: Whether the optimizer converged successfully.
        expr: OPTIMIZER_STATUS
        data_type: TEXT

    facts:
      - name: current_price
        synonyms: ["actual price", "today's price"]
        description: Current average selling price per ton.
        expr: CURRENT_PRICE
        data_type: NUMBER

      - name: optimal_price
        synonyms: ["recommended price", "best price"]
        description: Optimizer-recommended price per ton that maximizes profit within constraints.
        expr: OPTIMAL_PRICE
        data_type: NUMBER

      - name: price_delta_pct
        synonyms: ["price change", "price gap"]
        description: Percentage difference between optimal and current price. Positive means the optimizer recommends raising price.
        expr: PRICE_DELTA_PCT
        data_type: NUMBER

      - name: current_profit
        synonyms: ["current margin dollars"]
        description: Current profit in USD at current prices.
        expr: CURRENT_PROFIT
        data_type: NUMBER

      - name: optimal_profit
        synonyms: ["achievable profit"]
        description: Predicted profit in USD at optimal prices.
        expr: OPTIMAL_PROFIT
        data_type: NUMBER

      - name: profit_delta
        synonyms: ["profit gap", "profit opportunity", "money left on the table"]
        description: Incremental profit available by moving to optimal prices. Positive = profit opportunity.
        expr: PROFIT_DELTA
        data_type: NUMBER

      - name: profit_delta_pct
        description: Profit improvement as a percentage of current profit.
        expr: PROFIT_DELTA_PCT
        data_type: NUMBER

    metrics:
      - name: total_profit_opportunity
        synonyms: ["total money on the table"]
        description: Sum of profit delta across all products and regions.
        expr: SUM(optimal_pricing.PROFIT_DELTA)

  # ============================================
  # COPULA_PARAMETERS - Joint risk model config
  # ============================================
  - name: copula_parameters
    description: Copula model parameters used for correlated Monte Carlo simulation. Captures the joint dependence structure between risk factors (volume, price, energy, construction, weather).
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ML
      table: COPULA_PARAMETERS
    primary_key:
      columns: [param_id]

    dimensions:
      - name: param_id
        description: Unique identifier for copula parameter set.
        expr: PARAM_ID
        data_type: NUMBER

      - name: copula_type
        synonyms: ["copula", "dependence model"]
        description: Type of copula (gaussian or student-t). Gaussian has zero tail dependence; t-copula captures joint extreme events.
        expr: COPULA_TYPE
        data_type: TEXT
        sample_values: ["gaussian", "student_t"]

      - name: model_version
        description: Model version (v1=3 variables, v2=5 variables).
        expr: MODEL_VERSION
        data_type: TEXT

    facts:
      - name: degrees_of_freedom
        synonyms: ["df"]
        description: Degrees of freedom for Student-t copula. NULL for Gaussian. Lower df = heavier tails.
        expr: DEGREES_OF_FREEDOM
        data_type: NUMBER

      - name: tail_dependence_lower
        synonyms: ["lower tail dependence", "crash correlation"]
        description: Lower tail dependence coefficient. Higher means more correlated extreme losses.
        expr: TAIL_DEPENDENCE_LOWER
        data_type: NUMBER

      - name: tail_dependence_upper
        synonyms: ["upper tail dependence"]
        description: Upper tail dependence coefficient.
        expr: TAIL_DEPENDENCE_UPPER
        data_type: NUMBER

      - name: aic
        description: Akaike Information Criterion. Lower is better for model selection.
        expr: AIC
        data_type: NUMBER

      - name: bic
        description: Bayesian Information Criterion. Lower is better. Used to select between copula types.
        expr: BIC
        data_type: NUMBER

      - name: n_observations
        synonyms: ["sample size"]
        description: Number of monthly observations used to fit the copula.
        expr: N_OBSERVATIONS
        data_type: NUMBER

  # ============================================
  # MODEL_COMPARISON - Naive vs Copula risk
  # ============================================
  - name: model_comparison
    description: Side-by-side comparison of naive (independent) vs copula (correlated) Monte Carlo risk metrics. The gap reveals how much tail risk is hidden when ignoring joint dependence.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ML
      table: MODEL_COMPARISON
    primary_key:
      columns: [comparison_id]

    dimensions:
      - name: comparison_id
        description: Unique identifier for the model comparison row.
        expr: COMPARISON_ID
        data_type: NUMBER

      - name: scenario_id
        synonyms: ["scenario", "case"]
        description: Scenario identifier (e.g., BASE_CASE, BASE_CASE_V2).
        expr: SCENARIO_ID
        data_type: TEXT

    facts:
      - name: naive_p50
        synonyms: ["naive median"]
        description: Median (P50) revenue from naive independent simulation, in USD.
        expr: NAIVE_P50
        data_type: NUMBER

      - name: naive_var_95
        synonyms: ["naive VaR", "naive value at risk"]
        description: 95% Value at Risk from naive simulation, in USD. Represents worst-case loss at 95% confidence assuming independent risks.
        expr: NAIVE_VAR_95
        data_type: NUMBER

      - name: naive_cvar_95
        synonyms: ["naive CVaR", "naive expected shortfall"]
        description: 95% Conditional VaR (expected shortfall) from naive simulation, in USD.
        expr: NAIVE_CVAR_95
        data_type: NUMBER

      - name: copula_p50
        synonyms: ["copula median"]
        description: Median (P50) revenue from copula simulation, in USD.
        expr: COPULA_P50
        data_type: NUMBER

      - name: copula_var_95
        synonyms: ["copula VaR", "copula value at risk"]
        description: 95% Value at Risk from copula simulation, in USD. Captures joint tail risk. This is the preferred risk metric.
        expr: COPULA_VAR_95
        data_type: NUMBER

      - name: copula_cvar_95
        synonyms: ["copula CVaR", "copula expected shortfall"]
        description: 95% Conditional VaR from copula simulation, in USD. Represents average loss in the worst 5% of scenarios.
        expr: COPULA_CVAR_95
        data_type: NUMBER

      - name: naive_p10
        synonyms: ["naive downside", "naive P10"]
        description: 10th percentile revenue from naive simulation, in USD.
        expr: NAIVE_P10
        data_type: NUMBER

      - name: naive_prob_miss
        synonyms: ["naive miss probability"]
        description: Probability of missing revenue guidance under naive (independent) simulation.
        expr: NAIVE_PROB_MISS
        data_type: NUMBER

      - name: var_gap_pct
        synonyms: ["VaR gap", "risk gap"]
        description: Percentage gap between copula and naive VaR. Computed as (copula_var - naive_var) / |naive_var| * 100. Positive means copula shows LESS tail risk than naive; negative means copula shows MORE tail risk. The sign varies by scenario — do not assume a fixed direction.
        expr: VAR_GAP_PCT
        data_type: NUMBER

      - name: cvar_gap_pct
        synonyms: ["CVaR gap"]
        description: Percentage gap between copula and naive CVaR. Same sign convention as var_gap_pct.
        expr: CVAR_GAP_PCT
        data_type: NUMBER

      - name: copula_prob_miss
        synonyms: ["probability of miss", "miss probability"]
        description: Probability of missing revenue guidance under copula simulation.
        expr: COPULA_PROB_MISS
        data_type: NUMBER

      - name: copula_p10
        synonyms: ["copula downside", "copula P10"]
        description: 10th percentile revenue from copula simulation, in USD. Represents the downside tail with joint dependence captured.
        expr: COPULA_P10
        data_type: NUMBER

      - name: n_paths
        synonyms: ["simulation paths", "number of simulations"]
        description: Number of Monte Carlo simulation paths.
        expr: N_PATHS
        data_type: NUMBER

      - name: n_months
        synonyms: ["forecast horizon", "horizon months"]
        description: Number of months in the forecast horizon (typically 12).
        expr: N_MONTHS
        data_type: NUMBER

  # ============================================
  # MSHA_QUARRY_SITES - Competitor quarry map
  # ============================================
  - name: msha_quarry_sites
    description: US quarry and mine site locations from MSHA (Mine Safety and Health Administration) public data. 10,343 active stone and sand/gravel quarries with GPS coordinates, operator names, and employee counts.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: MSHA_QUARRY_SITES
    primary_key:
      columns: [mine_id]

    dimensions:
      - name: mine_id
        description: MSHA-assigned mine identification number.
        expr: MINE_ID
        data_type: TEXT

      - name: mine_name
        synonyms: ["quarry name", "site name"]
        description: Name of the mine or quarry.
        expr: MINE_NAME
        data_type: TEXT

      - name: operator_name
        synonyms: ["operator", "company"]
        description: Current operator name as registered with MSHA.
        expr: OPERATOR_NAME
        data_type: TEXT

      - name: operator_group
        synonyms: ["parent company", "competitor"]
        description: Mapped operator group. VULCAN = our sites, MLM = Martin Marietta, CRH, HEIDELBERG, EXP = Eagle Materials, SUM = Summit.
        expr: OPERATOR_GROUP
        data_type: TEXT
        sample_values: ["VULCAN", "MLM", "CRH", "HEIDELBERG", "EXP", "SUM", "ROGERS", "KNIFE_RIVER", "CEMEX", "OTHER"]

      - name: state
        synonyms: ["US state"]
        description: US state abbreviation where the quarry is located.
        expr: STATE
        data_type: TEXT

      - name: county
        description: FIPS county name.
        expr: COUNTY
        data_type: TEXT

      - name: region_code
        synonyms: ["region"]
        description: Mapped to SnowCore sales regions (CALIFORNIA, TEXAS, FLORIDA, etc.). OTHER for non-core states.
        expr: REGION_CODE
        data_type: TEXT

      - name: primary_canvass
        synonyms: ["commodity type"]
        description: MSHA canvass code description. Stone or SandAndGravel.
        expr: PRIMARY_CANVASS
        data_type: TEXT
        sample_values: ["Stone", "SandAndGravel"]

      - name: mine_status
        synonyms: ["status"]
        description: Current mine operating status (Active or Intermittent).
        expr: MINE_STATUS
        data_type: TEXT

    facts:
      - name: latitude
        description: GPS latitude of the quarry site.
        expr: LATITUDE
        data_type: NUMBER

      - name: longitude
        description: GPS longitude of the quarry site.
        expr: LONGITUDE
        data_type: NUMBER

      - name: no_employees
        synonyms: ["employees", "workforce", "headcount"]
        description: Number of workers employed at the mine site.
        expr: NO_EMPLOYEES
        data_type: NUMBER

    metrics:
      - name: total_sites
        synonyms: ["site count", "quarry count"]
        description: Count of quarry sites.
        expr: COUNT(msha_quarry_sites.MINE_ID)

      - name: total_employees
        description: Total employees across quarry sites.
        expr: SUM(msha_quarry_sites.NO_EMPLOYEES)

  # ============================================
  # MONTHLY_MACRO_INDICATORS - Construction spending
  # ============================================
  - name: monthly_macro_indicators
    description: Monthly macroeconomic indicators for construction spending from Census/Marketplace data. 72 rows covering total, highway, and residential construction spend.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: MONTHLY_MACRO_INDICATORS
    primary_key:
      columns: [indicator_id]

    dimensions:
      - name: indicator_id
        description: Unique identifier for the macro indicator row.
        expr: INDICATOR_ID
        data_type: NUMBER

      - name: data_source
        description: Source of the macro data.
        expr: DATA_SOURCE
        data_type: TEXT

    time_dimensions:
      - name: year_month
        synonyms: ["month", "period"]
        description: Month of the macro data.
        expr: YEAR_MONTH
        data_type: DATE

    facts:
      - name: total_construction_usd
        synonyms: ["total construction spending", "construction"]
        description: Total US construction spending in USD.
        expr: TOTAL_CONSTRUCTION_USD
        data_type: NUMBER

      - name: highway_construction_usd
        synonyms: ["highway spending", "infrastructure spending", "IIJA"]
        description: Highway and street construction spending in USD. Key driver of aggregate demand.
        expr: HIGHWAY_CONSTRUCTION_USD
        data_type: NUMBER

      - name: residential_construction_usd
        synonyms: ["housing", "residential spending"]
        description: Residential construction spending in USD.
        expr: RESIDENTIAL_CONSTRUCTION_USD
        data_type: NUMBER

    metrics:
      - name: avg_highway_spend
        description: Average monthly highway construction spending.
        expr: AVG(monthly_macro_indicators.HIGHWAY_CONSTRUCTION_USD)

  # ============================================
  # MONTHLY_WEATHER_BY_REGION - Regional weather
  # ============================================
  - name: monthly_weather_by_region
    description: Monthly weather data by sales region. 438 rows covering temperature, precipitation, and work days. Key driver of seasonal volume patterns.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: MONTHLY_WEATHER_BY_REGION
    primary_key:
      columns: [region_code, year_month]

    dimensions:
      - name: region_code
        synonyms: ["region"]
        description: Sales region code matching SALES_REGION.
        expr: REGION_CODE
        data_type: TEXT

    time_dimensions:
      - name: year_month
        synonyms: ["month", "period"]
        description: Month of the weather observation.
        expr: YEAR_MONTH
        data_type: DATE

    facts:
      - name: temp_avg_f
        synonyms: ["average temperature", "temperature"]
        description: Average monthly temperature in Fahrenheit.
        expr: TEMP_AVG_F
        data_type: NUMBER

      - name: temp_high_avg_f
        synonyms: ["high temperature"]
        description: Average daily high temperature in Fahrenheit.
        expr: TEMP_HIGH_AVG_F
        data_type: NUMBER

      - name: precip_total_in
        synonyms: ["rainfall", "precipitation"]
        description: Total monthly precipitation in inches.
        expr: PRECIP_TOTAL_IN
        data_type: NUMBER

      - name: precip_days
        synonyms: ["rain days"]
        description: Number of days with measurable precipitation.
        expr: PRECIP_DAYS
        data_type: NUMBER

      - name: n_weather_days
        synonyms: ["weather work days", "work days", "operable days"]
        description: Number of weather-suitable work days in the month. Higher = more production/delivery capacity.
        expr: N_WEATHER_DAYS
        data_type: NUMBER

  # ============================================
  # MONTHLY_ENERGY_PRICE_INDEX - Energy costs
  # ============================================
  - name: monthly_energy_price_index
    description: Monthly energy price index tracking aggregate production input costs. 72 rows. Energy is a key cost driver for asphalt/concrete.
    base_table:
      database: SNOWCORE_MATERIALS_DB
      schema: ATOMIC
      table: MONTHLY_ENERGY_PRICE_INDEX
    primary_key:
      columns: [year_month]

    time_dimensions:
      - name: year_month
        synonyms: ["month", "period"]
        description: Month of the energy price index.
        expr: YEAR_MONTH
        data_type: DATE

    facts:
      - name: energy_price_index
        synonyms: ["energy index", "energy cost", "EPI"]
        description: Composite energy price index. Higher values indicate rising energy costs which compress margins on asphalt and concrete.
        expr: ENERGY_PRICE_INDEX
        data_type: NUMBER

    dimensions:
      - name: data_source
        description: Source of the energy price data.
        expr: DATA_SOURCE
        data_type: TEXT


