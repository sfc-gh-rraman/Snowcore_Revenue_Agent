# ============================================
# VERIFIED QUERIES
# ============================================
verified_queries:
  - name: current_volume_by_region
    question: "What are current shipments by region?"
    use_as_onboarding_question: true
    sql: |
      SELECT 
        REGION_CODE as region,
        SUM(SHIPMENT_TONS) as total_tons,
        SUM(REVENUE_USD) as total_revenue_usd,
        AVG(PRICE_PER_TON) as avg_price_per_ton
      FROM __monthly_shipments
      WHERE YEAR_MONTH >= DATEADD('month', -3, CURRENT_DATE())
      GROUP BY REGION_CODE
      ORDER BY total_tons DESC

  - name: ytd_revenue
    question: "What is year-to-date revenue?"
    use_as_onboarding_question: true
    sql: |
      SELECT 
        YEAR(YEAR_MONTH) as fiscal_year,
        SUM(REVENUE_USD) / 1e9 as revenue_billions,
        SUM(SHIPMENT_TONS) / 1e6 as volume_millions_tons,
        SUM(REVENUE_USD) / NULLIF(SUM(SHIPMENT_TONS), 0) as realized_price_per_ton
      FROM __monthly_shipments
      WHERE YEAR_MONTH >= DATE_TRUNC('year', CURRENT_DATE())
      GROUP BY YEAR(YEAR_MONTH)

  - name: segment_mix
    question: "What is the product segment mix?"
    sql: |
      SELECT 
        PRODUCT_SEGMENT_CODE as segment,
        SUM(SHIPMENT_TONS) as total_tons,
        SUM(REVENUE_USD) as total_revenue,
        SUM(REVENUE_USD) / NULLIF(SUM(SUM(REVENUE_USD)) OVER (), 0) * 100 as revenue_share_pct
      FROM __monthly_shipments
      WHERE YEAR_MONTH >= DATEADD('year', -1, CURRENT_DATE())
      GROUP BY PRODUCT_SEGMENT_CODE
      ORDER BY total_revenue DESC


  - name: gas_price_trend
    question: "What is the natural gas price trend?"
    sql: |
      SELECT 
        DATE_TRUNC('week', PRICE_DATE) as week,
        AVG(NATURAL_GAS_HENRY_HUB) as avg_gas_price,
        MIN(NATURAL_GAS_HENRY_HUB) as min_gas,
        MAX(NATURAL_GAS_HENRY_HUB) as max_gas
      FROM __commodity_prices
      WHERE PRICE_DATE >= DATEADD('month', -6, CURRENT_DATE())
        AND NATURAL_GAS_HENRY_HUB IS NOT NULL
      GROUP BY DATE_TRUNC('week', PRICE_DATE)
      ORDER BY week DESC

  - name: elasticity_by_product
    question: "What is the price elasticity for each product?"
    use_as_onboarding_question: true
    sql: |
      SELECT
        PRODUCT_SEGMENT_CODE as product,
        OWN_ELASTICITY as elasticity,
        R_SQUARED as model_fit,
        CASE
          WHEN ABS(OWN_ELASTICITY) < 1 THEN 'INELASTIC - Pricing Power'
          ELSE 'ELASTIC - Volume Risk'
        END as interpretation,
        MODEL_VERSION
      FROM __price_elasticity
      WHERE REGION_CODE = 'ALL'
      ORDER BY ABS(OWN_ELASTICITY) DESC

  - name: product_substitutes
    question: "Which products are substitutes vs complements?"
    sql: |
      SELECT
        PRODUCT_I as product_affected,
        PRODUCT_J as price_changed_product,
        CROSS_ELASTICITY,
        RELATIONSHIP_TYPE,
        P_VALUE
      FROM __elasticity_matrix
      WHERE PRODUCT_I != PRODUCT_J
      ORDER BY ABS(CROSS_ELASTICITY) DESC

  - name: pricing_opportunity
    question: "How much profit are we leaving on the table?"
    use_as_onboarding_question: true
    sql: |
      SELECT
        REGION_CODE as region,
        PRODUCT_SEGMENT_CODE as product,
        CURRENT_PRICE,
        OPTIMAL_PRICE,
        PRICE_DELTA_PCT * 100 as price_change_pct,
        PROFIT_DELTA / 1e6 as profit_opportunity_millions,
        OPTIMIZER_STATUS
      FROM __optimal_pricing
      WHERE MODEL_VERSION = (SELECT MAX(MODEL_VERSION) FROM __optimal_pricing)
        AND OPTIMIZER_STATUS = 'Optimization terminated successfully'
      ORDER BY PROFIT_DELTA DESC

  - name: copula_vs_naive_risk
    question: "How does copula VaR compare to naive VaR?"
    use_as_onboarding_question: true
    sql: |
      SELECT
        SCENARIO_ID,
        NAIVE_P50 / 1e9 as naive_median_b,
        COPULA_P50 / 1e9 as copula_median_b,
        NAIVE_VAR_95 / 1e9 as naive_var_b,
        COPULA_VAR_95 / 1e9 as copula_var_b,
        VAR_GAP_PCT as var_gap_pct,
        NAIVE_CVAR_95 / 1e9 as naive_cvar_b,
        COPULA_CVAR_95 / 1e9 as copula_cvar_b,
        CVAR_GAP_PCT as cvar_gap_pct,
        N_PATHS as simulation_paths
      FROM __model_comparison
      ORDER BY SCENARIO_ID

  - name: demand_drivers
    question: "What are the key demand drivers by region?"
    sql: |
      SELECT
        ms.REGION_CODE as region,
        ms.YEAR_MONTH,
        SUM(ms.SHIPMENT_TONS) as volume_tons,
        SUM(ms.REVENUE_USD) as revenue_usd,
        m.HIGHWAY_CONSTRUCTION_USD / 1e9 as highway_spend_b,
        m.RESIDENTIAL_CONSTRUCTION_USD / 1e9 as residential_spend_b,
        w.TEMP_AVG_F as avg_temp_f,
        w.PRECIP_DAYS as rain_days,
        w.N_WEATHER_DAYS as work_days,
        e.ENERGY_PRICE_INDEX as energy_index
      FROM __monthly_shipments ms
      LEFT JOIN __monthly_macro_indicators m ON ms.YEAR_MONTH = m.YEAR_MONTH
      LEFT JOIN __monthly_weather_by_region w ON ms.YEAR_MONTH = w.YEAR_MONTH AND ms.REGION_CODE = w.REGION_CODE
      LEFT JOIN __monthly_energy_price_index e ON ms.YEAR_MONTH = e.YEAR_MONTH
      WHERE ms.YEAR_MONTH >= DATEADD('month', -6, CURRENT_DATE())
        AND ms.YEAR_MONTH <= (SELECT MAX(YEAR_MONTH) FROM __monthly_macro_indicators)
      GROUP BY ms.REGION_CODE, ms.YEAR_MONTH, m.HIGHWAY_CONSTRUCTION_USD, m.RESIDENTIAL_CONSTRUCTION_USD,
               w.TEMP_AVG_F, w.PRECIP_DAYS, w.N_WEATHER_DAYS, e.ENERGY_PRICE_INDEX
      ORDER BY ms.YEAR_MONTH DESC, volume_tons DESC

  - name: weather_impact_by_region
    question: "How does weather affect shipment volume by region?"
    sql: |
      SELECT
        w.REGION_CODE as region,
        DATE_TRUNC('quarter', w.YEAR_MONTH) as quarter,
        AVG(w.PRECIP_DAYS) as avg_rain_days,
        AVG(w.N_WEATHER_DAYS) as avg_work_days,
        AVG(w.TEMP_AVG_F) as avg_temp_f,
        SUM(ms.SHIPMENT_TONS) as total_tons
      FROM __monthly_weather_by_region w
      JOIN __monthly_shipments ms ON w.YEAR_MONTH = ms.YEAR_MONTH AND w.REGION_CODE = ms.REGION_CODE
      GROUP BY w.REGION_CODE, DATE_TRUNC('quarter', w.YEAR_MONTH)
      ORDER BY quarter DESC, total_tons DESC

  - name: construction_spending_trend
    question: "What is the construction spending trend?"
    sql: |
      SELECT
        YEAR_MONTH,
        TOTAL_CONSTRUCTION_USD / 1e9 as total_construction_b,
        HIGHWAY_CONSTRUCTION_USD / 1e9 as highway_b,
        RESIDENTIAL_CONSTRUCTION_USD / 1e9 as residential_b
      FROM __monthly_macro_indicators
      ORDER BY YEAR_MONTH DESC

  - name: copula_tail_risk
    question: "What is the tail dependence in the copula model?"
    sql: |
      SELECT
        COPULA_TYPE,
        MODEL_VERSION,
        TAIL_DEPENDENCE_LOWER as lower_tail,
        TAIL_DEPENDENCE_UPPER as upper_tail,
        AIC,
        BIC,
        N_OBSERVATIONS,
        CASE
          WHEN TAIL_DEPENDENCE_LOWER > 0.1 THEN 'Significant tail dependence - joint crashes likely'
          WHEN TAIL_DEPENDENCE_LOWER > 0 THEN 'Mild tail dependence'
          ELSE 'Zero tail dependence (Gaussian copula)'
        END as tail_risk_assessment
      FROM __copula_parameters
      ORDER BY MODEL_VERSION DESC

  - name: competitor_quarry_count
    question: "How many quarries does each competitor have?"
    sql: |
      SELECT
        OPERATOR_GROUP as competitor,
        COUNT(*) as quarry_sites,
        SUM(NO_EMPLOYEES) as total_employees,
        COUNT(DISTINCT STATE) as states_present
      FROM __msha_quarry_sites
      WHERE OPERATOR_GROUP != 'OTHER'
      GROUP BY OPERATOR_GROUP
      ORDER BY quarry_sites DESC

  - name: competitor_sites_by_state
    question: "Where are competitor quarries in Texas?"
    sql: |
      SELECT
        OPERATOR_GROUP as competitor,
        MINE_NAME as quarry,
        COUNTY,
        LATITUDE,
        LONGITUDE,
        NO_EMPLOYEES as employees,
        PRIMARY_CANVASS as commodity
      FROM __msha_quarry_sites
      WHERE STATE = 'TX'
        AND OPERATOR_GROUP != 'OTHER'
      ORDER BY OPERATOR_GROUP, NO_EMPLOYEES DESC

  - name: revenue_by_product
    question: "What is revenue by product line?"
    sql: |
      SELECT
        ms.PRODUCT_SEGMENT_CODE as product_code,
        ps.SEGMENT_NAME as product_name,
        ps.SEGMENT_TYPE as category,
        SUM(ms.REVENUE_USD) / 1e9 as revenue_b,
        SUM(ms.SHIPMENT_TONS) / 1e6 as volume_m_tons,
        SUM(ms.REVENUE_USD) / NULLIF(SUM(ms.SHIPMENT_TONS), 0) as avg_price_per_ton
      FROM __monthly_shipments ms
      JOIN __product_segment ps ON ms.PRODUCT_SEGMENT_CODE = ps.SEGMENT_CODE
      WHERE ms.YEAR_MONTH >= DATEADD('year', -1, CURRENT_DATE())
      GROUP BY ms.PRODUCT_SEGMENT_CODE, ps.SEGMENT_NAME, ps.SEGMENT_TYPE
      ORDER BY revenue_b DESC

  - name: stone_elasticity
    question: "How elastic is crushed stone demand?"
    sql: |
      SELECT
        PRODUCT_SEGMENT_CODE as product,
        OWN_ELASTICITY as elasticity,
        STANDARD_ERROR,
        R_SQUARED as model_fit,
        N_OBSERVATIONS as sample_size,
        MODEL_VERSION,
        CASE
          WHEN ABS(OWN_ELASTICITY) < 1 THEN 'INELASTIC - Can raise prices with limited volume loss'
          ELSE 'ELASTIC - Price increases risk significant volume decline'
        END as business_implication
      FROM __price_elasticity
      WHERE PRODUCT_SEGMENT_CODE = 'AGG_STONE'
        AND REGION_CODE = 'ALL'

  - name: miss_probability
    question: "What is the probability we miss guidance?"
    sql: |
      SELECT
        SCENARIO_ID,
        COPULA_PROB_MISS as copula_miss_probability,
        NAIVE_PROB_MISS as naive_miss_probability,
        COPULA_P50 / 1e9 as copula_expected_revenue_b,
        N_PATHS as simulation_paths,
        N_MONTHS as forecast_months
      FROM __model_comparison
      ORDER BY SCENARIO_ID

# ============================================
# CUSTOM INSTRUCTIONS
# ============================================
custom_instructions: >
  This semantic model covers SnowCore Materials (Vulcan) revenue intelligence.
  
  Key business context:
  - SnowCore Materials is the largest US producer of construction aggregates
  - FY2025: ~$7.9B revenue, ~227M tons shipped, ~$21.98/ton freight-adjusted price
  - 6 product lines: AGG_STONE (~47%), AGG_SAND (~20%), AGG_SPECIALTY (~13%), ASPHALT_MIX (~11%), CONCRETE_RMX (~7%), SERVICE_LOGISTICS (~2%)
  - 7 sales regions: TEXAS, SOUTHEAST, FLORIDA, CALIFORNIA, VIRGINIA, ILLINOIS, MEXICO
  
  Revenue Decomposition (CRITICAL):
  - Revenue = Price × Volume × Product Mix. Always decompose when analyzing revenue changes.
  - When comparing periods, attribute changes to: price effect + volume effect + mix effect.
  
  Elasticity Interpretation:
  - |elasticity| < 1 = INELASTIC = pricing power (can raise prices with limited volume loss)
  - |elasticity| > 1 = ELASTIC = volume risk (price increases significantly reduce demand)
  - Cross-elasticity > 0 = SUBSTITUTES (stone vs sand), < 0 = COMPLEMENTS (aggregates and asphalt)
  - Warn when R-squared < 0.3 (low confidence in the elasticity estimate)
  
  Risk Analytics (Copula vs Naive):
  - ALWAYS present copula-based VaR/CVaR as the PRIMARY risk metric
  - Copula captures joint dependence (e.g., diesel spike + construction slowdown + bad weather simultaneously)
  - VaR = "the most we'd lose in 19 out of 20 quarters"
  - CVaR = "if we DO have a bad quarter, the average loss"
  - VAR_GAP_PCT sign varies by scenario: negative means copula shows MORE risk, positive means copula shows LESS risk. Always show actual data — do not assume a fixed direction.
  - BASE_CASE (v1): var_gap = -2.16% (copula worse). BASE_CASE_V2: var_gap = +0.72% (copula better). Present both and let the data speak.
  
  Competitor Intelligence:
  - MSHA data covers 10,343 active quarries in the US with GPS coordinates
  - Major competitors: Martin Marietta (MLM, 269 sites), SnowCore/Vulcan (193), Heidelberg (145), CRH (42)
  - Aggregates delivery radius is ~50 miles — local market share matters more than national
  
  Pricing Optimization:
  - Constraints: margin floor 15%, price change ±10%, capacity cap 95%, competitor parity ±5%
  - Optimizer runs SLSQP via stored procedure ML.SP_OPTIMIZE_PRICING
  - profit_delta shows the incremental profit from moving to optimal prices
  - WARNING: In v2, only 18 of 36 optimizer runs converged. In v1, all 36 converged. Always filter by OPTIMIZER_STATUS = 'Optimization terminated successfully'. Non-converged rows show boundary PRICE_DELTA_PCT values (±10%) and should be excluded or flagged.
  
  Seasonality and Weather:
  - Volume is seasonal: Q2-Q3 peak, Q1/Q4 trough
  - Price increases typically 4-5% annually, announced in January
  - Weather impacts vary by region (Southeast Q1 rain, Texas summer heat)
  - Public sector (IIJA-funded highway) provides stable demand floor
  
  Data Coverage:
  - All monthly tables use first-of-month date convention (2025-10-01 = October 2025)
  - Shipments: Jan 2020 – Feb 2026. Weather: Jan 2020 – Jan 2026. Macro/Energy: Jan 2020 – Dec 2025.
  - When joining shipments to macro or energy for recent months (Jan–Feb 2026), expect NULLs — macro/energy data lags 2 months.
  - Always use LEFT JOIN when combining shipments with macro/weather/energy to avoid dropping shipment rows.
